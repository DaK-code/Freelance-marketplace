{% extends 'base.html' %}

{% block title %}Change Password - Freelance Marketplace{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header bg-warning">
                <h3 class="mb-0">Change Password</h3>
            </div>
            <div class="card-body p-5">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="old_password" class="form-label">Current Password</label>
                        <input type="password" class="form-control" id="old_password" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password1" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new_password1" name="new_password1" required minlength="6">
                        <small class="form-text text-muted">At least 6 characters</small>
                    </div>
                    <div class="mb-3">
                        <label for="new_password2" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="new_password2" name="new_password2" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Change Password</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'user_profile' user.id %}">Back to Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
