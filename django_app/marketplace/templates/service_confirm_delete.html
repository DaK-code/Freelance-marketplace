{% extends 'base.html' %} {% block title %}Delete Service - Confirm{% endblock
%} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Delete Service</h4>
      </div>
      <div class="card-body">
        <p class="mb-3">Are you sure you want to delete this service?</p>
        <div class="alert alert-warning">
          <strong>Service:</strong> {{ service.title }}<br />
          <strong>Price:</strong> ${{ service.price }}<br />
          <p class="mb-0"><em>This action cannot be undone.</em></p>
        </div>

        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a
            href="{% url 'service_detail' service.id %}"
            class="btn btn-secondary"
            >Cancel</a
          >
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
